# =====================================================================
#  Hardened Vaultwarden reverse-proxy vhost  (Angie / nginx)
#  Reference example shipped with vaultwarden-crs-plugin.
#
#  This is the EDGE half of the defence. It does natively (no per-request
#  ModSecurity cost) what the CRS plugin does in the WAF layer, PLUS the
#  things ModSecurity can't or shouldn't do:
#
#    - a positive-security PATH allowlist  -> unknown paths return 404
#    - an HTTP method allowlist            -> unknown verbs return 405
#    - per-endpoint rate limiting          -> brute-force / scraping
#      (the CRS plugin can't do this: libmodsecurity3 has no persistent
#       per-IP collections, so rate limiting belongs here at the edge)
#    - security response headers
#    - sane body-size + timeout limits
#    - WebSocket support for the notifications hub
#
#  Run the CRS plugin AND this vhost together (belt and braces), or this
#  vhost alone if you don't operate ModSecurity. See the project README.
#
#  Adjust: server_name, upstream address, cert paths, and the rate limits
#  (start loose, tighten after watching your own logs).
# =====================================================================

# ---------------------------------------------------------------------
#  Rate-limit zones  (define at http{} scope -- move these to your main
#  http block / a conf.d snippet; they cannot live inside server{}).
#
#  $binary_remote_addr keys per client IP. If you sit behind another
#  proxy/CDN, key on the real client IP (set_real_ip_from + real_ip).
# ---------------------------------------------------------------------
#  vault_auth : login / token endpoints -- brute-force surface. Strict.
#  vault_reg  : account registration    -- mass-signup abuse.
#  vault_send : anonymous Send download  -- scraping / bandwidth.
#  vault_gen  : everything else          -- generous; just a flood cap.
# ---------------------------------------------------------------------
limit_req_zone  $binary_remote_addr  zone=vault_auth:10m  rate=10r/m;
limit_req_zone  $binary_remote_addr  zone=vault_reg:10m   rate=5r/m;
limit_req_zone  $binary_remote_addr  zone=vault_send:10m  rate=60r/m;
limit_req_zone  $binary_remote_addr  zone=vault_gen:10m   rate=30r/s;
limit_req_status 429;
limit_conn_zone $binary_remote_addr  zone=vault_conn:10m;

# ---------------------------------------------------------------------
#  Method allowlist map: 1 = denied. Vaultwarden uses only
#  GET/POST/PUT/DELETE/HEAD/OPTIONS (verified against src/api/*).
# ---------------------------------------------------------------------
map $request_method $vault_bad_method {
    default                 1;
    ~^(?:GET|POST|PUT|DELETE|HEAD|OPTIONS)$  0;
}

upstream vaultwarden_backend {
    zone vaultwarden_backend 64k;
    server 127.0.0.1:8080;          # <-- your Vaultwarden container/port
    keepalive 4;
}

# ----- HTTP -> HTTPS redirect ----------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name vault.example.com;          # <-- change

    # Even on the redirect vhost, swallow obvious probes quietly.
    location / { return 301 https://$host$request_uri; }
}

# ----- HTTPS ---------------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    listen 443 quic;
    listen [::]:443 quic;
    http2 on;
    server_name vault.example.com;          # <-- change

    # ---- TLS (point at your real cert) ----
    ssl_certificate     /etc/letsencrypt/live/vault.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vault.example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:vaultTLS:10m;
    ssl_stapling on;
    ssl_stapling_verify on;
    add_header Alt-Svc 'h3=":443"; ma=86400' always;

    # ---- Security response headers ----
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header Referrer-Policy           "no-referrer" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;
    # Vaultwarden's web vault needs inline styles/wasm; keep CSP conservative
    # but functional. Tighten per your audit.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' wss:; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;
    # Don't advertise the server.
    server_tokens off;
    more_clear_headers Server;              # (headers-more module; optional)

    # ---- Body size + timeouts ----
    client_max_body_size 525M;              # attachments/sends; lower if unused
    client_body_timeout  30s;
    client_header_timeout 15s;
    send_timeout         30s;
    limit_conn vault_conn 50;

    # ---- ModSecurity: keep it ON and enable the CRS plugin here too ----
    # modsecurity on;
    # modsecurity_rules '
    #     SecAction "id:9530001,phase:1,nolog,pass,\
    #         setvar:tx.vaultwarden-plugin_enabled=1,\
    #         setvar:tx.vaultwarden-plugin_positive_security=1,\
    #         setvar:tx.vaultwarden-plugin_argname_allowlist=1"
    # ';

    access_log /var/log/nginx/vault.access.log;
    error_log  /var/log/nginx/vault.error.log;

    # ==========  Method allowlist  ==========
    if ($vault_bad_method) { return 405; }

    # =====================================================================
    #  Positive-security PATH allowlist.
    #
    #  nginx matches the MOST specific location, so we enumerate Vaultwarden's
    #  real route prefixes as explicit locations, then a catch-all `location /`
    #  that returns 404. Result: only known routes reach the backend; probes
    #  for /wp-login.php, /.env, /vendor, /phpmyadmin, ... get a plain 404 and
    #  never touch Vaultwarden.
    #
    #  Route map verified against Vaultwarden source (src/api/mod.rs mounts +
    #  src/api/web.rs static routes). Mount points are ONLY:
    #    /  /api  /admin  /events  /identity  /icons  /notifications
    #  plus the top-level web routes (/attachments, /alive, /vw_static, /css,
    #  /.well-known) and the web-vault static tree (served from / by Vaultwarden
    #  itself, so the static file names fall through to the backend via the
    #  allow-listed root document set below).
    # =====================================================================

    # ----- auth / login surface: rate-limited hard -----
    location = /admin {
        limit_req zone=vault_auth burst=5 nodelay;
        include /etc/nginx/snippets/vault_proxy.conf;   # see bottom note
        proxy_pass http://vaultwarden_backend;
    }
    location ^~ /admin/ {
        limit_req zone=vault_auth burst=10 nodelay;
        include /etc/nginx/snippets/vault_proxy.conf;
        proxy_pass http://vaultwarden_backend;
    }
    location = /identity/connect/token {
        limit_req zone=vault_auth burst=5 nodelay;
        include /etc/nginx/snippets/vault_proxy.conf;
        proxy_pass http://vaultwarden_backend;
    }
    location = /api/accounts/register {
        limit_req zone=vault_reg burst=3 nodelay;
        include /etc/nginx/snippets/vault_proxy.conf;
        proxy_pass http://vaultwarden_backend;
    }

    # ----- anonymous Send download: scraping cap -----
    location ^~ /api/sends/ {
        limit_req zone=vault_send burst=20 nodelay;
        include /etc/nginx/snippets/vault_proxy.conf;
        proxy_pass http://vaultwarden_backend;
    }

    # ----- WebSocket notifications hub -----
    location ^~ /notifications/ {
        limit_req zone=vault_gen burst=50 nodelay;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 1h;
        include /etc/nginx/snippets/vault_proxy.conf;
        proxy_pass http://vaultwarden_backend;
    }

    # ----- the rest of the known API/identity/static surface -----
    location ^~ /api/         { limit_req zone=vault_gen burst=50 nodelay; include /etc/nginx/snippets/vault_proxy.conf; proxy_pass http://vaultwarden_backend; }
    location ^~ /identity/    { limit_req zone=vault_gen burst=50 nodelay; include /etc/nginx/snippets/vault_proxy.conf; proxy_pass http://vaultwarden_backend; }
    location ^~ /events/      { limit_req zone=vault_gen burst=50 nodelay; include /etc/nginx/snippets/vault_proxy.conf; proxy_pass http://vaultwarden_backend; }
    location ^~ /icons/       { limit_req zone=vault_gen burst=30 nodelay; include /etc/nginx/snippets/vault_proxy.conf; proxy_pass http://vaultwarden_backend; }
    location ^~ /attachments/ { limit_req zone=vault_send burst=20 nodelay; include /etc/nginx/snippets/vault_proxy.conf; proxy_pass http://vaultwarden_backend; }
    location ^~ /.well-known/ { include /etc/nginx/snippets/vault_proxy.conf; proxy_pass http://vaultwarden_backend; }
    location = /alive         { include /etc/nginx/snippets/vault_proxy.conf; proxy_pass http://vaultwarden_backend; }
    location ^~ /vw_static/   { include /etc/nginx/snippets/vault_proxy.conf; proxy_pass http://vaultwarden_backend; }
    location ^~ /css/         { include /etc/nginx/snippets/vault_proxy.conf; proxy_pass http://vaultwarden_backend; }

    # ----- web-vault root + its static tree (served from / by Vaultwarden) -----
    #  The web vault ships hashed bundles under /app /scripts /styles /fonts
    #  /images /locales and a handful of root files. Allow those, plus the
    #  document root, then DENY everything else.
    location = /            { limit_req zone=vault_gen burst=50 nodelay; include /etc/nginx/snippets/vault_proxy.conf; proxy_pass http://vaultwarden_backend; }
    location ^~ /app/       { include /etc/nginx/snippets/vault_proxy.conf; proxy_pass http://vaultwarden_backend; }
    location ^~ /scripts/   { include /etc/nginx/snippets/vault_proxy.conf; proxy_pass http://vaultwarden_backend; }
    location ^~ /styles/    { include /etc/nginx/snippets/vault_proxy.conf; proxy_pass http://vaultwarden_backend; }
    location ^~ /fonts/     { include /etc/nginx/snippets/vault_proxy.conf; proxy_pass http://vaultwarden_backend; }
    location ^~ /images/    { include /etc/nginx/snippets/vault_proxy.conf; proxy_pass http://vaultwarden_backend; }
    location ^~ /videos/    { include /etc/nginx/snippets/vault_proxy.conf; proxy_pass http://vaultwarden_backend; }
    location ^~ /locales/   { include /etc/nginx/snippets/vault_proxy.conf; proxy_pass http://vaultwarden_backend; }
    location ^~ /connectors/ { include /etc/nginx/snippets/vault_proxy.conf; proxy_pass http://vaultwarden_backend; }

    # Known root files (manifest, icons, connector bridges, version files).
    location ~ ^/(?:index\.html|manifest\.json|app-id\.json|browserconfig\.xml|favicon\.ico|version\.json|vw-version\.json|[a-z-]+-connector\.html)$ {
        include /etc/nginx/snippets/vault_proxy.conf;
        proxy_pass http://vaultwarden_backend;
    }
    # Root-level hashed bundles (styles.<hash>.js, theme_head.<hash>.js, *.wasm).
    location ~ ^/[a-zA-Z0-9_.-]+\.(?:css|js|map|wasm|png|jpe?g|gif|ico|svg|webp|avif|woff2?|ttf|eot)$ {
        include /etc/nginx/snippets/vault_proxy.conf;
        proxy_pass http://vaultwarden_backend;
    }

    # ==========  DEFAULT DENY  ==========
    #  Anything not matched above is unknown -> plain 404 (not 403; looks like
    #  an ordinary not-found, gives a scanner no signal that a WAF is here).
    location / {
        return 404;
    }

    # Block dotfiles / common secret probes outright (defence in depth; the
    # default-deny already covers these, but make the intent explicit).
    location ~ /\.(?!well-known) { return 404; }
}

# =====================================================================
#  snippets/vault_proxy.conf  -- create this file with the shared proxy
#  headers (kept out of every location to stay DRY):
#
#     proxy_set_header Host              $host;
#     proxy_set_header X-Real-IP         $remote_addr;
#     proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
#     proxy_set_header X-Forwarded-Proto $scheme;
#     proxy_redirect   off;
#     proxy_read_timeout 90s;
#
#  Notes:
#   - `more_clear_headers` needs the headers-more module; drop the line if
#     you don't build it.
#   - QUIC/HTTP3 lines assume an Angie/nginx built with HTTP/3; remove if not.
#   - Tune every rate: these defaults are deliberately conservative. Watch
#     for 429s in the access log and loosen where real clients are hit
#     (mobile/desktop clients can burst on first sync).
#   - Pair with fail2ban on the Vaultwarden log for distributed slow brute
#     force that per-IP limit_req can't see.
# =====================================================================

---
meta:
  author: "eilander"
  description: "Vaultwarden positive-security: request outside known route map is denied"
rule_id: 9530230
tests:
  # NOTE: the 1.1.0 deep-fake-path tightening (e.g. /deep/fake/path/x.json now
  # denied) is verified by the regex matrix + live on vault.myguard.nl, but is
  # NOT regression-tested here. The CI nginx image uses `return 200 "ok"` (no
  # try_files) so REQUEST_FILENAME is never rewritten and 9530230 sees the real
  # URI. In production Vaultwarden is proxy_pass'd, same behaviour.
  - test_id: 1
    desc: "A scanner probe path (/wp-login.php) is denied by the route allowlist"
    stages:
      - input:
          dest_addr: 127.0.0.1
          headers:
            Host: ci.local
            User-Agent: OWASP CRS
            Accept: "*/*"
          port: 80
          method: GET
          uri: /wp-login.php
        output:
          log:
            expect_ids: [9530230]
  - test_id: 2
    desc: "A dotfile probe (/.env) is denied by the route allowlist"
    stages:
      - input:
          dest_addr: 127.0.0.1
          headers:
            Host: ci.local
            User-Agent: OWASP CRS
            Accept: "*/*"
          port: 80
          method: GET
          uri: /.env
        output:
          log:
            expect_ids: [9530230]
  - test_id: 3
    desc: "A real Vaultwarden API route passes the route allowlist"
    stages:
      - input:
          dest_addr: 127.0.0.1
          headers:
            Host: ci.local
            User-Agent: OWASP CRS
            Accept: "*/*"
          port: 80
          method: GET
          uri: /api/sync
        output:
          log:
            no_expect_ids: [9530230]
  - test_id: 4
    desc: "The identity token endpoint passes the route allowlist"
    stages:
      - input:
          dest_addr: 127.0.0.1
          headers:
            Host: ci.local
            User-Agent: OWASP CRS
            Accept: "*/*"
          port: 80
          method: GET
          uri: /identity/connect/token
        output:
          log:
            no_expect_ids: [9530230]
  - test_id: 5
    desc: "An icon proxy path passes the route allowlist"
    stages:
      - input:
          dest_addr: 127.0.0.1
          headers:
            Host: ci.local
            User-Agent: OWASP CRS
            Accept: "*/*"
          port: 80
          method: GET
          uri: /icons/example.com/icon.png
        output:
          log:
            no_expect_ids: [9530230]
  - test_id: 6
    desc: "A hashed web-vault static bundle passes the route allowlist"
    stages:
      - input:
          dest_addr: 127.0.0.1
          headers:
            Host: ci.local
            User-Agent: OWASP CRS
            Accept: "*/*"
          port: 80
          method: GET
          uri: /app/main.ccecbc3360eea592b940.js
        output:
          log:
            no_expect_ids: [9530230]
  - test_id: 7
    desc: "The admin-panel bundle served at root passes the route allowlist"
    stages:
      - input:
          dest_addr: 127.0.0.1
          headers:
            Host: ci.local
            User-Agent: OWASP CRS
            Accept: "*/*"
          port: 80
          method: GET
          uri: /bootstrap.bundle.js
        output:
          log:
            no_expect_ids: [9530230]

# OWASP CRS Plugin
# Plugin name: vaultwarden
# Plugin description: Tailored OWASP CRS support for Vaultwarden --
#                     "after" rules (positive security / PATH allowlist
#                     layer; OPT-IN).
# Rule ID block base: 9,530,000 (range is 1000, thus ID block base +1000)
# Plugin version: 2.0.0

# ------------------------------------------------------------------------
# This implements a PATH allowlist: on the Vaultwarden host, any request
# whose URL is not one of Vaultwarden's known mount points (or the web-vault
# static tree) is denied. It stops probes for /wp-login.php, /.env,
# /phpmyadmin, /vendor, ... cold, regardless of payload.
#
# There is deliberately NO ARGS_NAMES allowlist (unlike the ViMbAdmin
# plugin): Vaultwarden is a JSON API whose argument names are per-endpoint
# JSON keys that change across client/server versions, so an arg-name
# allowlist would false-block legitimate clients. PATH allowlisting is the
# right positive-security primitive for an API app.
#
# OFF by default. Turn it on ONLY after running CRS in DetectionOnly and
# confirming every real route below is reachable. The route map was derived
# from Vaultwarden's Rocket mount points (src/main.rs) + the bundled
# web-vault static tree (ls /web-vault inside vaultwarden/server:latest),
# re-verified at source commit 169aa5e.
# ------------------------------------------------------------------------

# Skip the whole layer unless the plugin is enabled for this vhost. phase:1 so
# it also strips the phase-1 method/Content-Type/arg-name rules in time.
SecRule TX:vaultwarden-plugin_enabled "!@eq 1" \
    "id:9530200,phase:1,pass,nolog,ver:'vaultwarden-plugin/2.0.0',ctl:ruleRemoveById=9530201-9530399"

# Skip the positive-security layer (method/Content-Type/path allowlist,
# 9530220-9530239) unless that sub-feature is on.
SecRule TX:vaultwarden-plugin_positive_security "!@eq 1" \
    "id:9530201,phase:1,pass,nolog,ver:'vaultwarden-plugin/2.0.0',ctl:ruleRemoveById=9530220-9530239"

# NOTE: the argument-name allowlist (9530240/9530245) lives in
# vaultwarden-BEFORE.conf, not here. Its deny must evaluate BEFORE the CRS
# anomaly-blocking rule 949110 (which runs at the end of the core rules, i.e.
# before this "after" file), otherwise a request that CRS already scored >=5
# is blocked by 949110 and the allowlist deny is never reached. "before" runs
# ahead of the core rules, so that's where the arg-name allowlist belongs.

# ------------------------------------------------------------------------
# [ HTTP method allowlist ]  Vaultwarden's Rocket routes only use these verbs
# (src/api/*: #[get/post/put/delete] + HEAD/OPTIONS for CORS preflight and the
# /alive HEAD). Anything else (TRACE, CONNECT, PATCH, PROPFIND, junk verbs) is
# not a real client and is denied. Cheap, near-zero FP.
#
# NOT tagged OWASP_CRS (2.0.0): a host-level or plugin `ruleRemoveByTag=
# OWASP_CRS` FP strip (e.g. 9530105 on the auth paths) must NOT be able to
# disable this enforcement rule.
# ------------------------------------------------------------------------
SecRule REQUEST_METHOD "!@rx ^(?:GET|POST|PUT|DELETE|HEAD|OPTIONS)$" \
    "id:9530220,\
    phase:1,\
    deny,\
    status:405,\
    log,\
    t:none,\
    msg:'Vaultwarden positive-security: HTTP method not used by Vaultwarden',\
    logdata:'method: %{REQUEST_METHOD}',\
    ver:'vaultwarden-plugin/2.0.0',\
    tag:'application-multi',\
    tag:'vaultwarden',\
    setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}',\
    severity:'CRITICAL'"

# ------------------------------------------------------------------------
# [ Content-Type enforcement on /api writes ]  Vaultwarden's API bodies are
# application/json, EXCEPT two well-defined cases that use multipart or form:
#   - /api/sends/file* and /api/ciphers/<id>/attachment*  (multipart uploads)
#   - the OAuth token grant lives under /identity, not /api, so it's excluded
#     here anyway.
# A write (POST/PUT) to /api with any other Content-Type is a smuggling/odd-
# encoding probe. GET/DELETE carry no body and are skipped.
# ------------------------------------------------------------------------
# NOTE: the disruptive action (deny) MUST live on the chain STARTER --
# libmodsecurity3 rejects disruptive actions on non-starter chained rules
# ("Disruptive actions can only be specified by chain starter rules"). The
# conditions are the chain links; the starter carries deny/status only.
#
# setvar MUST live on the LAST chain link, NOT the starter. libmodsecurity3
# executes a chain starter's setvar as soon as the STARTER operator matches,
# *before* the chain links are evaluated -- so a setvar on the starter here
# (REQUEST_METHOD ^(POST|PUT)$) scored +critical on EVERY POST/PUT to ANY
# URI (/admin, JSON /api/sync, /identity/connect/token), pushing the inbound
# anomaly score to 5 and tripping 949110 even though the chain never denied.
# Non-disruptive setvar IS allowed on a chain link and only fires when the
# whole chain matches, so the score is added exactly when 415 would deny.
#
# NOT tagged OWASP_CRS (2.0.0) -- see 9530220 note.
SecRule REQUEST_METHOD "@rx ^(?:POST|PUT)$" \
    "id:9530225,\
    phase:1,\
    deny,\
    status:415,\
    log,\
    t:none,\
    msg:'Vaultwarden positive-security: non-JSON Content-Type on /api write',\
    logdata:'ct: %{REQUEST_HEADERS.Content-Type}',\
    ver:'vaultwarden-plugin/2.0.0',\
    tag:'application-multi',\
    tag:'vaultwarden',\
    severity:'CRITICAL',\
    chain"
    SecRule REQUEST_FILENAME "@rx ^/?(?:[a-z0-9_-]+/)?api/" \
        "t:none,t:lowercase,t:normalizePath,chain"
        SecRule REQUEST_FILENAME "!@rx ^/?(?:[a-z0-9_-]+/)?api/(?:sends/file|ciphers/[^/]+/attachment)" \
            "chain"
            SecRule REQUEST_HEADERS:Content-Type "!@rx ^application/json(?:;|$)" \
                "t:none,t:lowercase,\
                setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}'"

# ------------------------------------------------------------------------
# Path allowlist. Only Vaultwarden's real routes + the web-vault static tree
# may be reached. Anything else under the host is denied (404 -- look like a
# normal not-found, not an obvious WAF block).
#
# Mount-agnostic: each route token is matched after at most ONE optional
# leading path segment via `^/?(?:[a-z0-9_-]+/)?`, so it works whether
# Vaultwarden is at the webroot or under a single-segment location/basepath
# prefix (src/main.rs mounts everything under `basepath`). 2.0.0 tightened
# this from the old `(?:^|/)` (which matched the token at ANY depth, so a
# probe like /wp-content/images/shell.php slipped through on the `images`
# segment). A multi-segment basepath (rare) needs the prefix group widened.
#
# Route map verified against Vaultwarden source (src/main.rs mounts +
# src/api/web.rs static routes) and the extracted web-vault tree, not guessed.
# Server mounts are ONLY:
#   /  /api  /admin  /events  /identity  /icons  /notifications
# Sends are under /api (src/api/core/sends.rs -> /api/sends/...), NOT a
# top-level /sends. Attachments ARE top-level: /attachments/<cipher>/<file>
# (src/api/web.rs). /alive, /css/vaultwarden.css, /vw_static/<file> and
# /.well-known/apple-app-site-association are explicit web.rs routes.
#
# web-vault catch-all: src/api/web.rs `web_files` serves `/<p..>` from the
# web-vault folder (or 404s). Rather than allow every path, we allow only the
# real static DIRECTORIES that ship in the tree plus root-level files with a
# known static extension -- so probes for /wp-login.php, /.env, /vendor never
# reach the backend.
#
# Branches:
#   root         : `/` and `/index.html` ONLY -- anchored `^/?(?:index\.html)?$`
#                  (2.0.0: was `(?:^|/)(?:index\.html)?$`, whose leading-slash
#                  alternative matched the trailing slash of ANY path, so
#                  /wp-login.php/, /.env/, /phpmyadmin/ slipped through --
#                  fixed.)
#   mount dirs   : api|identity|admin|events|icons|notifications  (server mounts)
#   top routes   : attachments|alive|css  (explicit web.rs routes)
#   static dirs  : vw_static|connectors|locales|app|scripts|fonts|images|videos
#                  (real directories in the web-vault tree)
#   well-known   : /.well-known/apple-app-site-association  (only well-known
#                  route in web.rs) + change-password convenience redirect
#   root files   : one path segment only, ending in a known static extension
#                  (css js map wasm json xml ico png jpg gif svg webp avif
#                  woff woff2 ttf eot) -- covers the hashed webpack bundles
#                  (155.<hash>.js, styles.<hash>.css, <hash>.module.wasm,
#                  <hash>.json, version.json, vw-version.json, manifest.json,
#                  app-id.json, browserconfig.xml, favicon.ico). Single-segment
#                  anchor `^/?[a-z0-9_.-]+\.<ext>$` so a deep fake path ending
#                  in .json/.js does NOT slip past.
#   connectors   : root-level *-connector.html + 404.html
#                  (duo-redirect-, redirect-, sso-, proxy-cookie-redirect-,
#                  webauthn-, webauthn-fallback-, webauthn-mobile-connector.html)
#
# 2.0.0 change: the previous stale root-named-static branch (bootstrap.*,
# datatables.*, jquery-*.slim.js, jdenticon-*.js, admin*.js, admin.css,
# 404.css, error-x.svg) was REMOVED -- those are served under /vw_static/
# (src/api/web.rs static_files match arms), NOT the webroot, and are already
# covered by the vw_static dir branch.
# ------------------------------------------------------------------------
SecRule REQUEST_FILENAME \
    "!@rx ^/?(?:index\.html)?$|^/?(?:[a-z0-9_-]+/)?(?:api|identity|admin|events|icons|notifications|attachments|alive|css|vw_static|connectors|locales|app|scripts|fonts|images|videos)(?:/.*)?$|^/?(?:[a-z0-9_-]+/)?\.well-known/(?:apple-app-site-association|change-password)$|^/?[a-z0-9_.-]+\.(?:css|js|map|wasm|json|xml|ico|png|jpe?g|gif|svg|webp|avif|woff2?|ttf|eot)$|^/?(?:404\.html|[a-z0-9-]+-connector\.html)$" \
    "id:9530230,\
    phase:2,\
    deny,\
    status:404,\
    log,\
    t:none,t:lowercase,t:normalizePath,\
    msg:'Vaultwarden positive-security: request outside known route map',\
    logdata:'path: %{REQUEST_FILENAME}',\
    ver:'vaultwarden-plugin/2.0.0',\
    tag:'application-multi',\
    tag:'vaultwarden',\
    setvar:'tx.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}',\
    severity:'CRITICAL'"

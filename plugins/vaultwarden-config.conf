# OWASP CRS Plugin
# Plugin name: vaultwarden
# Plugin description: Tailored OWASP CRS support for Vaultwarden
#                     (https://github.com/dani-garcia/vaultwarden), the
#                     Rust Bitwarden-compatible server. Provides
#                     false-positive exclusions for the JSON API + admin
#                     panel AND an optional positive-security (PATH
#                     allowlist) layer that denies any request outside
#                     Vaultwarden's known route map.
# Rule ID block base: 9,530,000 (range is 1000, thus ID block base +1000)
# Plugin version: 1.2.0

# ------------------------------------------------------------------------
#  WHY THIS DIFFERS FROM A FORM-APP PLUGIN
# ------------------------------------------------------------------------
#  Vaultwarden is a JSON API: clients (web-vault, browser extensions,
#  mobile, desktop, the Bitwarden CLI) POST application/json bodies, plus a
#  few x-www-form-urlencoded calls on /identity/connect/token. Their
#  argument NAMES are JSON keys that vary per endpoint and per client
#  version, so a vimbadmin-style ARGS_NAMES allowlist would false-block real
#  traffic. This plugin therefore does NOT ship an arg-name allowlist. Its
#  positive-security layer is a PATH allowlist only (block any URL outside
#  Vaultwarden's mount points + the web-vault static tree). Value scanning
#  (SQLi/XSS heuristics) still runs on whatever CRS parses; the before.conf
#  exclusions only strip the targets that are known-noisy ciphertext blobs.
# ------------------------------------------------------------------------

# ------------------------------------------------------------------------
#  HOW TO USE
# ------------------------------------------------------------------------
#  1. Copy the three plugins/vaultwarden-*.conf files into your CRS plugins/
#     directory (loaded automatically by crs-setup).
#
#  2. Scope: OFF by default, enabled PER VHOST. In the Vaultwarden
#     server/location block set tx.vaultwarden-plugin_enabled=1 via a phase:1
#     SecAction. The rules never touch other vhosts sharing the CRS engine
#     because the flag is only set in that one block. NOTE: the vault vhost
#     must NOT have `modsecurity off;` for any of this to run.
#
#  3. The path-allowlist layer (vaultwarden-after.conf) FOLLOWS the enable
#     flag by default. To run exclusions WITHOUT the allowlist, set
#     tx.vaultwarden-plugin_positive_security=0 explicitly in the enable
#     block. Test in DetectionOnly first.
# ------------------------------------------------------------------------

# Generic enable seeder. OFF unless a vhost opts in (a vhost setvar=1 wins).
SecRule &TX:vaultwarden-plugin_enabled "@eq 0" \
    "id:9530010,\
    phase:1,\
    pass,\
    nolog,\
    ver:'vaultwarden-plugin/1.2.0',\
    setvar:'tx.vaultwarden-plugin_enabled=0'"

# Positive-security sub-feature: defaults to FOLLOW the enable flag unless a
# vhost set it explicitly (escape hatch: setvar=0 in the enable block).
SecRule &TX:vaultwarden-plugin_positive_security "@eq 0" \
    "id:9530012,\
    phase:1,\
    pass,\
    nolog,\
    ver:'vaultwarden-plugin/1.2.0',\
    setvar:'tx.vaultwarden-plugin_positive_security=%{tx.vaultwarden-plugin_enabled}'"

# Argument-name allowlist sub-feature (EXPERIMENTAL, default OFF -- does NOT
# follow the enable flag). Vaultwarden is a JSON API whose body keys vary per
# endpoint/client/version, so a body allowlist is unsafe; this feature ONLY
# allowlists the two stable, fully-enumerated non-JSON surfaces:
#   - the /identity/connect/token form fields (fixed OAuth field set), and
#   - GET query-string parameter names.
# JSON request bodies are never arg-name-checked. Turn on per vhost ONLY after
# a DetectionOnly burn-in:
#   setvar:tx.vaultwarden-plugin_argname_allowlist=1
SecRule &TX:vaultwarden-plugin_argname_allowlist "@eq 0" \
    "id:9530014,\
    phase:1,\
    pass,\
    nolog,\
    ver:'vaultwarden-plugin/1.2.0',\
    setvar:'tx.vaultwarden-plugin_argname_allowlist=0'"

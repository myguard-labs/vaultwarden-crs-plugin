# OWASP CRS Plugin
# Plugin name: vaultwarden
# Plugin description: Tailored OWASP CRS support for Vaultwarden --
#                     "before" rules (false-positive exclusions). Runs
#                     before the CRS rules so it can disable target checks.
# Rule ID block base: 9,530,000 (range is 1000, thus ID block base +1000)
# Plugin version: 1.2.0

# ------------------------------------------------------------------------
# These strip well-understood false positives in Vaultwarden's JSON API and
# admin panel. The whole block is gated by tx.vaultwarden-plugin_enabled,
# which is OFF by default and set to 1 only from the Vaultwarden vhost.
# There is no Host gate: scoping is the per-vhost enable flag, so these
# exclusions cannot weaken protection on other sites behind the same CRS.
#
# Note on payloads: the Bitwarden protocol is end-to-end encrypted. Cipher
# fields, keys, attachments and the protected symmetric key are opaque
# base64 / "2.<iv>|<ct>|<mac>" EncString blobs. To CRS these look like
# base64/SQLi/encoding anomalies, so the heaviest noise is on those bodies.
# ------------------------------------------------------------------------

# Master off-switch: when not enabled for this vhost, strip the whole
# exclusion range (9530100-9530199) for this request.
SecRule TX:vaultwarden-plugin_enabled "!@eq 1" \
    "id:9530099,phase:1,pass,nolog,ver:'vaultwarden-plugin/1.2.0',ctl:ruleRemoveById=9530100-9530199"

# ------------------------------------------------------------------------
# [ Argument-name allowlist -- EXPERIMENTAL, opt-in via
#   tx.vaultwarden-plugin_argname_allowlist=1 ]
#
# These live in the BEFORE file on purpose: their deny must evaluate ahead of
# the CRS anomaly-blocking rule (949110, end of the core rules). If they were
# in the AFTER file, a request CRS already scored >=5 would be blocked by
# 949110 first and the allowlist deny would never be reached.
#
# Vaultwarden is a JSON API and its JSON body keys vary per endpoint, client
# and version -- so JSON bodies are NEVER arg-name-checked. Only the two
# stable, fully-enumerated NON-JSON surfaces are covered:
#   9530240 -- /identity/connect/token form fields (the ONLY
#              x-www-form-urlencoded endpoint; field set fixed by the
#              ConnectData struct in src/api/identity.rs, verified against
#              source; case-insensitive, snake_case + flattened variants).
#              ARGS_POST_NAMES scoped to that exact path, so JSON bodies on
#              other endpoints are untouched.
#   9530245 -- GET query-string parameter names (ARGS_GET_NAMES).
# Default OFF (gated by 9530202). Run DetectionOnly first.
# ------------------------------------------------------------------------

# Gate: strip the arg-name allowlist (9530240-9530249) unless its own flag is
# on. Independent of positive-security so the two enable separately.
SecRule TX:vaultwarden-plugin_argname_allowlist "!@eq 1" \
    "id:9530202,phase:1,pass,nolog,ver:'vaultwarden-plugin/1.2.0',ctl:ruleRemoveById=9530240-9530249"

# Form-field allowlist on the token endpoint (phase 2 -- request body parsed).
SecRule REQUEST_FILENAME "@rx (?:^|/)identity/connect/token$" \
    "id:9530240,\
    phase:2,\
    deny,\
    status:403,\
    log,\
    t:none,t:lowercase,t:normalizePath,\
    msg:'Vaultwarden positive-security: disallowed form field on token endpoint',\
    logdata:'unexpected form field: %{MATCHED_VAR_NAME}',\
    ver:'vaultwarden-plugin/1.2.0',\
    tag:'OWASP_CRS',\
    tag:'application-multi',\
    tag:'vaultwarden',\
    chain"
    SecRule ARGS_POST_NAMES "!@rx ^(?:grant_?type|refresh_?token|client_?id|client_?secret|password|scope|username|device_?identifier|device_?name|device_?type|device_?push_?token|two_?factor_?provider|two_?factor_?token|two_?factor_?remember|auth_?request|code|code_?verifier|state|redirect_?uri|nonce)$" \
        "t:none,t:lowercase"

# GET query-string parameter-name allowlist (phase 1).
SecRule ARGS_GET_NAMES "!@rx ^(?:excludedomains|count|t|negotiateversion|username|domain|id|type|continuationtoken|autofilltype|isotptype|start|end|deviceidentifier|hibp)$" \
    "id:9530245,\
    phase:1,\
    deny,\
    status:403,\
    log,\
    t:none,t:lowercase,\
    msg:'Vaultwarden positive-security: disallowed query parameter name',\
    logdata:'unexpected query arg: %{MATCHED_VAR_NAME}',\
    ver:'vaultwarden-plugin/1.2.0',\
    tag:'OWASP_CRS',\
    tag:'application-multi',\
    tag:'vaultwarden',\
    severity:'CRITICAL'"

# ------------------------------------------------------------------------
# [ Admin panel login ]  /admin -- the ADMIN_TOKEN is a long Argon2/PHC
# string ($argon2id$v=19$...) or opaque token that trips SQLi/encoding
# heuristics; the form posts it as `token`.
# ------------------------------------------------------------------------
SecRule REQUEST_FILENAME "@rx (?:^|/)admin(?:/.*)?$" \
    "id:9530101,\
    phase:2,\
    pass,\
    t:none,\
    nolog,\
    ver:'vaultwarden-plugin/1.2.0',\
    tag:'OWASP_CRS',\
    tag:'vaultwarden',\
    ctl:ruleRemoveTargetByTag=OWASP_CRS;ARGS:token"

# ------------------------------------------------------------------------
# [ OAuth token endpoint ]  /identity/connect/token -- the only routinely
# x-www-form-urlencoded body. Carries the master-password hash, refresh
# tokens, device identifiers and 2FA blobs: all high-entropy opaque values.
# ------------------------------------------------------------------------
SecRule REQUEST_FILENAME "@rx (?:^|/)identity/connect/token$" \
    "id:9530102,\
    phase:2,\
    pass,\
    t:none,\
    nolog,\
    ver:'vaultwarden-plugin/1.2.0',\
    tag:'OWASP_CRS',\
    tag:'vaultwarden',\
    ctl:ruleRemoveTargetByTag=OWASP_CRS;ARGS:password,\
    ctl:ruleRemoveTargetByTag=OWASP_CRS;ARGS:refresh_token,\
    ctl:ruleRemoveTargetByTag=OWASP_CRS;ARGS:deviceidentifier,\
    ctl:ruleRemoveTargetByTag=OWASP_CRS;ARGS:devicepushtoken,\
    ctl:ruleRemoveTargetByTag=OWASP_CRS;ARGS:authrequest,\
    ctl:ruleRemoveTargetByTag=OWASP_CRS;ARGS:twofactortoken,\
    ctl:ruleRemoveTargetByTag=OWASP_CRS;ARGS:code,\
    ctl:ruleRemoveTargetByTag=OWASP_CRS;ARGS:code_verifier"

# ------------------------------------------------------------------------
# [ JSON API bodies ]  The bulk of the API is application/json. ModSecurity
# only parses JSON arg values when the JSON body processor is on (CRS sets
# it via Content-Type). Vaultwarden cipher/account/key endpoints carry
# EncString + base64 blobs that read as base64/SQLi/PHP anomalies. Strip the
# noisiest base64/SQLi/PHP-injection rule families on these write paths
# rather than weakening the whole engine.
# Paths verified against source (src/api/core/{accounts,ciphers,sends}.rs,
# organizations.rs):
#   /api/accounts/...   register, password, key, kdf, security-stamp
#   /api/ciphers...     create/update + import + import-organization
#   /api/sends...       Bitwarden Send (file/text, opaque)
#   /api/organizations/<id>/users/...  invite/confirm (carry public keys)
# ------------------------------------------------------------------------
SecRule REQUEST_FILENAME "@rx (?:^|/)api/(?:accounts|ciphers|sends|organizations/[^/]+/users)" \
    "id:9530103,\
    phase:2,\
    pass,\
    t:none,\
    nolog,\
    ver:'vaultwarden-plugin/1.2.0',\
    tag:'OWASP_CRS',\
    tag:'vaultwarden',\
    ctl:ruleRemoveByTag=attack-injection-php,\
    ctl:ruleRemoveByTag=platform-multi,\
    ctl:ruleRemoveById=942100,\
    ctl:ruleRemoveById=942260,\
    ctl:ruleRemoveById=942330,\
    ctl:ruleRemoveById=942340,\
    ctl:ruleRemoveById=942370,\
    ctl:ruleRemoveById=942430,\
    ctl:ruleRemoveById=942440"

# ------------------------------------------------------------------------
# [ Icon fetch ]  /icons/<domain>/icon.png -- <domain> is a user-supplied
# hostname that can resemble path-traversal/SSRF heuristics to CRS but is
# validated by Vaultwarden itself.
# ------------------------------------------------------------------------
SecRule REQUEST_FILENAME "@rx (?:^|/)icons/" \
    "id:9530104,\
    phase:1,\
    pass,\
    t:none,\
    nolog,\
    ver:'vaultwarden-plugin/1.2.0',\
    tag:'OWASP_CRS',\
    tag:'vaultwarden',\
    ctl:ruleRemoveByTag=attack-lfi,\
    ctl:ruleRemoveByTag=attack-rfi"
